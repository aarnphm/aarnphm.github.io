<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 874 842" role="img" aria-labelledby="title desc">
  <title id="title">Compilation pipeline</title>
  <desc id="desc">A high level language program is translated by a compiler into an assembly language program, then by an assembler into a machine language program interpreted by the machine.</desc>
  <rect width="874" height="842" fill="#f4f7f8"/>
  <g fill="none" stroke="#000" stroke-width="3">
    <rect x="47" y="27" width="535" height="109"/>
    <rect x="47" y="310" width="535" height="110"/>
    <rect x="57" y="603" width="535" height="108"/>
    <path d="M295 138v168M300 421v178"/>
  </g>
  <rect x="28" y="710" width="595" height="30" fill="#d9d9d9" stroke="#000" stroke-width="3"/>
  <g fill="#000" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <g font-size="49" text-anchor="middle">
      <text x="314" y="72">High Level Language</text>
      <text x="314" y="119">Program</text>
      <text x="315" y="356">Assembly  Language</text>
      <text x="315" y="403">Program</text>
      <text x="325" y="649">Machine  Language</text>
      <text x="325" y="696">Program</text>
    </g>
    <g font-size="50">
      <text x="335" y="236">Compiler</text>
      <text x="342" y="519">Assembler</text>
      <text x="345" y="823" font-size="48">Machine Interpretation</text>
    </g>
  </g>
</svg>
